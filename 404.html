<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Page Not Found | Akash The Band</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        font-family: 'Almarai', sans-serif;
        background: #000;
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
        padding: 2rem;
        -webkit-font-smoothing: antialiased;
      }
      .noise {
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.15;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
        background-size: 256px 256px;
      }
      .glow {
        position: fixed;
        top: 50%;
        left: 50%;
        width: 600px;
        height: 600px;
        transform: translate(-50%, -50%);
        background: radial-gradient(circle, rgba(222,219,200,0.06) 0%, transparent 70%);
        pointer-events: none;
      }
      .content { position: relative; z-index: 1; }
      .code {
        font-family: 'Playfair Display', serif;
        font-size: clamp(5rem, 20vw, 10rem);
        font-style: italic;
        color: #DEDBC8;
        line-height: 1;
        margin-bottom: 0.5rem;
      }
      h1 {
        font-size: clamp(1.2rem, 4vw, 1.8rem);
        font-weight: 300;
        color: rgba(255,255,255,0.6);
        margin-bottom: 2.5rem;
        letter-spacing: 0.02em;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
        background: #DEDBC8;
        color: #000;
        text-decoration: none;
        font-weight: 700;
        font-size: 0.95rem;
        padding: 0.85rem 2rem;
        border-radius: 999px;
        transition: all 0.3s ease;
      }
      .btn:hover {
        gap: 1rem;
        background: #fff;
        transform: scale(1.02);
      }
      .btn svg {
        width: 20px;
        height: 20px;
        flex-shrink: 0;
      }
      .tagline {
        margin-top: 1.5rem;
        color: rgba(255,255,255,0.25);
        font-size: 0.8rem;
      }
    </style>
  </head>
  <body>
    <div class="noise"></div>
    <div class="glow"></div>
    <div class="content">
      <div class="code">404</div>
      <h1>This stage doesn&rsquo;t exist yet.</h1>
      <a class="btn" href="/akash-the-band/">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></polyline></svg>
        Back to Home
      </a>
      <p class="tagline">Akash The Band &mdash; Goa&rsquo;s Premier Bollywood Ensemble</p>
    </div>
  </body>
</html>
